# Production-oriented defaults for the shared Redis instance.
# Password is supplied at runtime via --requirepass (see docker-compose.yml).

bind 0.0.0.0
protected-mode yes
port 6379

# Persistence: AOF for durability; RDB snapshots as a fallback.
appendonly yes
appendfsync everysec
save 900 1
save 300 10
save 60 10000
dir /data

# Shared instance: cap memory and evict least-recently-used keys when full.
# Tune maxmemory on the server if projects need more cache space.
# maxmemory 256mb
maxmemory 512mb
# maxmemory-policy allkeys-lru

# Reduce accidental data loss on a multi-project host.
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""
