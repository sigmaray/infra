# Portainer CE — Docker management UI.
# Docker apps and Caddy reach it at portainer:9000 on the infra network (HTTP).
# Host-native access: https://127.0.0.1:${PORTAINER_HTTPS_PORT:-9443} (see README).
# Put ../reverse-proxy/ (Caddy) in front for hostname-based access in production.
#
# First deploy:
#   cp .env.example .env && $EDITOR .env
#   docker compose up -d
#   open the web UI to create the admin account

services:
  portainer:
    image: portainer/portainer-ce:2.28.1
    container_name: portainer
    hostname: portainer
    restart: unless-stopped
    logging:
      options:
        max-size: 10m
    command: --http-enabled
    ports:
      - "${PORTAINER_BIND_ADDRESS:-127.0.0.1}:${PORTAINER_HTTPS_PORT:-9443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    environment:
      TZ: ${TZ:-Europe/Moscow}
    networks:
      - infra

networks:
  infra:
    external: true
    name: infra
