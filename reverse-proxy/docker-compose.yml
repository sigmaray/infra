# Caddy reverse proxy for HTTP services on the infra network.
#
# Prerequisites: infra Docker network (created by postgres/ or 3proxy/ stack).
#
# First deploy:
#   cp .env.example .env && $EDITOR .env
#   cp Caddyfile.example Caddyfile && $EDITOR Caddyfile
#   docker compose up -d

services:
  caddy:
    image: caddy:2.10.0-alpine
    container_name: reverse-proxy
    restart: unless-stopped
    env_file: .env
    ports:
      - "${CADDY_BIND_ADDRESS:-0.0.0.0}:${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_BIND_ADDRESS:-0.0.0.0}:${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data:/data
      - ./config:/config
    networks:
      - infra
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --server-response --spider http://127.0.0.1:80/ 2>&1 | grep -q 'HTTP/'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
networks:
  infra:
    external: true
    name: infra
