# FreshRSS RSS feed aggregator.
# Docker apps and Caddy reach it at freshrss:80 on the infra network.
# Host-native access: http://127.0.0.1:${FRESHRSS_PORT:-8081} (see README).
# Put ../reverse-proxy/ (Caddy) in front for hostname-based access in production.
#
# First deploy:
#   cp .env.example .env && $EDITOR .env
#   docker compose up -d
#   open the web UI to complete first-time setup

services:
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss
    hostname: freshrss
    restart: unless-stopped
    logging:
      options:
        max-size: 10m
    ports:
      - "${FRESHRSS_BIND_ADDRESS:-127.0.0.1}:${FRESHRSS_PORT:-8081}:80"
    volumes:
      - ./data:/var/www/FreshRSS/data
      - ./extensions:/var/www/FreshRSS/extensions
    environment:
      TZ: ${TZ:-Europe/Moscow}
      CRON_MIN: ${CRON_MIN:-*/5}
      TRUSTED_PROXY: ${TRUSTED_PROXY:-172.16.0.1/12 192.168.0.1/16}
    healthcheck:
      test: ["CMD", "cli/health.php"]
      timeout: 10s
      start_period: 60s
      start_interval: 11s
      interval: 75s
      retries: 3
    networks:
      - infra

networks:
  infra:
    external: true
    name: infra
