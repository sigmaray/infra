# Bugsink — self-hosted Sentry-compatible error tracking.
# Docker apps and Caddy reach it at bugsink:8000 on the infra network.
# Host-native access: http://127.0.0.1:${BUGSINK_PORT:-8000} (see README).
# Put ../reverse-proxy/ (Caddy) in front for hostname-based access in production.
#
# Prerequisites: shared PostgreSQL on the infra network (../postgres/).
#   cd ../postgres && ./scripts/create-database.sh bugsink
#
# First deploy:
#   cp .env.example .env && $EDITOR .env
#   docker compose up -d
#   open the web UI to create the admin account

services:
  bugsink:
    image: bugsink/bugsink:2.2.2
    container_name: bugsink
    hostname: bugsink
    restart: unless-stopped
    logging:
      options:
        max-size: 10m
    ports:
      - "${BUGSINK_BIND_ADDRESS:-127.0.0.1}:${BUGSINK_PORT:-8000}:8000"
    environment:
      PORT: 8000
      SECRET_KEY: ${BUGSINK_SECRET_KEY:?Set BUGSINK_SECRET_KEY in .env}
      DATABASE_URL: ${BUGSINK_DATABASE_URL:?Set BUGSINK_DATABASE_URL in .env}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c ''import requests; requests.get("http://localhost:8000/health/ready").raise_for_status()''',
        ]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 60s
    networks:
      - infra

networks:
  infra:
    external: true
    name: infra
